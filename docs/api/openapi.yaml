openapi: 3.1.0

info:
  title: STF Supreme Chess API
  version: 0.1.0
  description: |
    REST API for the STF Supreme Chess attendance and payment management system.
    All protected endpoints require a valid JWT delivered via httpOnly cookie.

servers:
  - url: http://localhost:3000/api
    description: Local development

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: stf_token

  schemas:
    Role:
      type: string
      enum: [admin, teacher, coach, student]
      description: User role in the system

    ClassName:
      type: string
      nullable: true
      enum: ['1S','1T','1F','1J','1B','2S','2T','2F','2J','2B','3S','3T','3F','3J','3B','4S','4T','4F','4J','4B','5S','5T','5F','5J','5B']
      description: Student class/group identifier. Null if unassigned. Invalid values return 400.

    PaymentStatus:
      type: string
      enum: [pending, approved, rejected]
      description: Lifecycle status of a payment receipt

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Login username (not email)
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, name, username, role]
      description: Public user object returned by auth endpoints — never includes password_hash or email.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'

    UserDetail:
      type: object
      required: [id, name, username, role, isActive, createdAt]
      description: Full user object returned by user-management endpoints. Never includes passwordHash.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        className:
          $ref: '#/components/schemas/ClassName'
        createdAt:
          type: string
          format: date-time

    UserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserDetail'

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserDetail'

    CreateUserRequest:
      type: object
      required: [name, username, password, role]
      properties:
        name:
          type: string
        username:
          type: string
          description: "3–32 chars; lowercase letters, digits, underscores only."
          example: john_doe
        password:
          type: string
          format: password
          description: Minimum 8 characters.
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
          description: "Optional. 7–20 chars; digits, spaces, +, -, (, ) allowed."
        className:
          $ref: '#/components/schemas/ClassName'

    UpdateUserRequest:
      type: object
      description: |
        Updatable fields depend on caller role:
        - **Admin**: `name`, `phone`, `isActive`, `role`, `username`, `className` (any target)
        - **Teacher**: `name`, `phone`, `isActive`, `className` on a student target or own profile
        - **Self** (student/coach): `name`, `phone`, `className` on own profile only
        Non-admin callers including `username` receive 403 `"Only admin can change username"`.
        Changing a username does **not** invalidate the affected user's JWT (token uses `sub` = user ID).
      properties:
        name:
          type: string
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        role:
          $ref: '#/components/schemas/Role'
          description: Admin only. Non-admin callers receive 403.
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[a-z0-9_]+$"
          description: "Admin only. 3–32 chars; lowercase letters, digits, underscores. Must be unique — duplicate returns 409."
        className:
          $ref: '#/components/schemas/ClassName'

    SetPasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          format: password
          description: Minimum 8 characters.

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
          description: The user's existing password (used to verify identity).
        newPassword:
          type: string
          format: password
          description: "Minimum 8 characters. Must differ from currentPassword."

    UserSummary:
      type: object
      required: [id, name]
      description: Minimal user projection embedded in session detail responses.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    SessionCount:
      type: object
      required: [preAttendances]
      description: Prisma _count projection returned on list items.
      properties:
        preAttendances:
          type: integer
          description: Number of confirmed pre-attendance records for the session.

    SessionListItem:
      type: object
      required: [id, date, startTime, endTime, place, isCancelled, createdAt, createdById, _count]
      description: Session shape returned in the list response — flat IDs, no embedded relations.
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
          description: "ISO 8601 timestamp (Prisma @db.Date serialized as UTC midnight, e.g. 2026-04-20T00:00:00.000Z)"
        startTime:
          type: string
          format: date-time
          description: "ISO 8601 timestamp encoding the session start (date + time combined by server)"
        endTime:
          type: string
          format: date-time
          description: "ISO 8601 timestamp encoding the session end (date + time combined by server)"
        place:
          type: string
        notes:
          type: string
          nullable: true
        isCancelled:
          type: boolean
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdById:
          type: string
          format: uuid
        cancelledById:
          type: string
          format: uuid
          nullable: true
        _count:
          $ref: '#/components/schemas/SessionCount'
        myPreAttended:
          type: boolean
          description: "Present only for student role. True if the requesting student has confirmed pre-attendance for this session."

    Session:
      type: object
      required: [id, date, startTime, endTime, place, isCancelled, createdAt, createdById, createdBy, presentCount, paidCashCount, paidOnlineCount, unpaidCount]
      description: |
        Full session object returned by GET /sessions/{id}, POST, and PATCH.
        Includes embedded createdBy / cancelledBy relations. Row is never deleted — cancellation is soft.
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
          description: "ISO 8601 timestamp (Prisma @db.Date serialized as UTC midnight, e.g. 2026-04-20T00:00:00.000Z)"
        startTime:
          type: string
          format: date-time
          description: "ISO 8601 timestamp encoding the session start (date + time combined by server)"
        endTime:
          type: string
          format: date-time
          description: "ISO 8601 timestamp encoding the session end (date + time combined by server)"
        place:
          type: string
        notes:
          type: string
          nullable: true
        isCancelled:
          type: boolean
          description: Soft-cancel flag. Set via PATCH /sessions/{id}. Row is never deleted.
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdById:
          type: string
          format: uuid
        cancelledById:
          type: string
          format: uuid
          nullable: true
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        cancelledBy:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/UserSummary'
        presentCount:
          type: integer
          description: Count of Attendance records with present=true for this session. Present for all roles.
        paidCashCount:
          type: integer
          description: Present students with paidCash=true (cash collected by teacher at the session).
        paidOnlineCount:
          type: integer
          description: Distinct present students with an approved online Payment for this session.
        unpaidCount:
          type: integer
          description: "Present students not covered by either payment source: max(0, presentCount − (paidCash ∪ paidOnline))."
        myPreAttended:
          type: boolean
          description: "Present only for student role. True if the requesting student has confirmed pre-attendance for this session."
        myAttended:
          type: boolean
          description: "Present only for student role. True if the requesting student has an Attendance record with present=true for this session; false otherwise."
        myPaidCash:
          type: boolean
          description: "Present only for student role. True if the requesting student's Attendance record has paidCash=true for this session; false otherwise."

    SessionResponse:
      type: object
      required: [session]
      description: Wrapper for single-session responses.
      properties:
        session:
          $ref: '#/components/schemas/Session'

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionListItem'

    CreateSessionRequest:
      type: object
      required: [date, startTime, endTime, place]
      properties:
        date:
          type: string
          format: date
          description: Must be today or in the future (UTC).
        startTime:
          type: string
          description: "HH:MM or HH:MM:SS (24-hour). Must be before endTime."
          example: "09:00"
        endTime:
          type: string
          description: "HH:MM or HH:MM:SS (24-hour). Must be after startTime."
          example: "11:00"
        place:
          type: string
        notes:
          type: string

    UpdateSessionRequest:
      type: object
      description: |
        All fields are optional. `cancelledAt` and `cancelledById` are server-managed — client may not set them directly.
        Once cancelled, only an admin may un-cancel (`isCancelled: false`); all other edits on a cancelled session return 409.
      properties:
        date:
          type: string
          format: date
        startTime:
          type: string
          description: "HH:MM or HH:MM:SS"
        endTime:
          type: string
          description: "HH:MM or HH:MM:SS"
        place:
          type: string
        notes:
          type: string
          nullable: true
        isCancelled:
          type: boolean
          description: Set true to cancel; set false (admin only) to un-cancel.

    StudentSummary:
      type: object
      required: [id, name, username]
      description: Student projection embedded in attendance roster entries.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        username:
          type: string

    SessionSummary:
      type: object
      required: [id, date, startTime, endTime, place, isCancelled]
      description: Minimal session projection embedded in the attendance roster response.
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        place:
          type: string
        isCancelled:
          type: boolean

    PreAttendance:
      type: object
      required: [sessionId, studentId, confirmedAt]
      description: Records a student's intent to attend a session.
      properties:
        sessionId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        confirmedAt:
          type: string
          format: date-time

    PreAttendanceRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
          description: true to set pre-attendance; false to remove it.
        studentId:
          type: string
          format: uuid
          description: "Staff only (admin/teacher). Target student to act on behalf of. Omit to act as self (student callers only)."

    PreAttendanceResponse:
      type: object
      required: [preAttendance]
      properties:
        preAttendance:
          nullable: true
          description: The resulting PreAttendance record, or null if removed (confirmed=false).
          allOf:
            - $ref: '#/components/schemas/PreAttendance'

    AttendanceRosterEntry:
      type: object
      required: [student, preAttended, present, paidCash, onlinePaymentStatus]
      properties:
        student:
          $ref: '#/components/schemas/StudentSummary'
        preAttended:
          type: boolean
          description: Whether the student confirmed pre-attendance.
        present:
          type: boolean
          description: Whether the student was marked present by a teacher.
        paidCash:
          type: boolean
          description: Whether the student paid cash at the session.
        onlinePaymentStatus:
          type: string
          enum: [pending, approved, rejected]
          nullable: true
          description: Status of the student's most recent Payment for this session. Null if no payment has been uploaded.

    AttendanceRoster:
      type: object
      required: [session, roster]
      properties:
        session:
          $ref: '#/components/schemas/SessionSummary'
        roster:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRosterEntry'

    MarkAttendanceEntry:
      type: object
      required: [studentId, present, paidCash]
      properties:
        studentId:
          type: string
          format: uuid
        present:
          type: boolean
        paidCash:
          type: boolean

    MarkAttendanceRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MarkAttendanceEntry'

    Attendance:
      type: object
      required: [sessionId, studentId, present, paidCash]
      description: Actual attendance record set by a teacher.
      properties:
        sessionId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        present:
          type: boolean
        paidCash:
          type: boolean
        markedById:
          type: string
          format: uuid
          nullable: true
        markedAt:
          type: string
          format: date-time
          nullable: true

    PaymentSessionSummary:
      type: object
      required: [id, date, startTime, place, isCancelled]
      description: Minimal session projection embedded in Payment responses. Omits endTime.
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
          description: "ISO 8601 timestamp (Prisma @db.Date serialized as UTC midnight)"
        startTime:
          type: string
          format: date-time
        place:
          type: string
        isCancelled:
          type: boolean

    Payment:
      type: object
      required: [id, studentId, sessionId, amount, receiptUrl, status, uploadedAt, student, session]
      description: |
        Payment receipt record. The raw file path is never exposed — use `receiptUrl` to download the file via the guarded receipt endpoint.
        `amount` is a snapshot of the session fee at upload time and is never recalculated (FR-28).
        Embedded relations (`student`, `session`, `reviewedBy`) are present on all roles consistently.
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
          nullable: true
        amount:
          type: string
          description: "Session fee snapshotted at upload time (Prisma Decimal serialized as string, e.g. \"50.00\"). Not recalculated if admin changes the fee later (FR-28)."
          example: "50.00"
        receiptUrl:
          type: string
          description: "Authenticated download URL, e.g. /api/payments/{id}/receipt"
          example: /api/payments/abc-123/receipt
        status:
          $ref: '#/components/schemas/PaymentStatus'
        uploadedAt:
          type: string
          format: date-time
        reviewedById:
          type: string
          format: uuid
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        student:
          $ref: '#/components/schemas/StudentSummary'
        session:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PaymentSessionSummary'
        reviewedBy:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/UserSummary'

    PaymentResponse:
      type: object
      required: [payment]
      properties:
        payment:
          $ref: '#/components/schemas/Payment'

    PaymentListResponse:
      type: object
      required: [payments]
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'

    HistoryEntry:
      type: object
      required: [id, method, sessionId, sessionDate, sessionPlace, amount, status, paidAt, paymentId, reviewNote]
      description: |
        Single payment history entry. Covers both cash (teacher-marked) and online (receipt uploaded) payments.
        Online entries include all statuses (pending, approved, rejected) — not just approved.
        `id` is a compound string: `"online:<paymentId>"` for online entries, `"cash:<sessionId>:<studentId>"` for cash entries.
        **Known limitation:** cash entry `amount` reflects the *current* session fee at request time, not the fee active at payment time.
      properties:
        id:
          type: string
          description: "Compound entry ID. Format: \"online:<uuid>\" or \"cash:<sessionId>:<studentId>\". URL-encode colons when using as a path segment."
          example: online:abc12345-0000-0000-0000-000000000001
        method:
          type: string
          enum: [cash, online]
        sessionId:
          type: string
          format: uuid
        sessionDate:
          type: string
          format: date-time
          description: ISO 8601 date of the session.
        sessionPlace:
          type: string
        amount:
          type: string
          description: "Decimal string, e.g. \"50.00\". For cash entries: current fee at request time (not historical snapshot)."
          example: "50.00"
        status:
          type: string
          enum: [pending, approved, rejected]
          description: "Payment status. Cash entries are always \"approved\". Online entries reflect the actual PaymentStatus."
        paidAt:
          type: string
          format: date-time
          description: "For online approved: reviewedAt. For online pending/rejected: uploadedAt. For cash: Attendance markedAt."
        paymentId:
          type: string
          format: uuid
          nullable: true
          description: Present for online entries; null for cash entries.
        reviewNote:
          type: string
          nullable: true
          description: Reserved for future use. Always null in v1.

    HistoryListResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/HistoryEntry'
          description: Sorted by paidAt descending.

    FeeResponse:
      type: object
      required: [fee]
      properties:
        fee:
          type: number
          format: double
          description: Current session fee.
          example: 50.00

    SetFeeRequest:
      type: object
      required: [fee]
      properties:
        fee:
          type: number
          format: double
          description: "Positive number, max 2 decimal places, max 10000."
          example: 60.00

    ReviewPaymentRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, reject]
        note:
          type: string
          description: "Optional review note. Phase 1: stored only if the reviewNote column exists in the DB; otherwise logged and ignored."
          nullable: true

    AppConfig:
      type: object
      required: [id, key, value, updatedAt]
      description: Global configuration entry. Fee is stored as string value under key 'session_fee'.
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          example: session_fee
        value:
          type: string
          example: "50.00"
        updatedById:
          type: string
          format: uuid
          nullable: true
        updatedAt:
          type: string
          format: date-time

    TournamentSummary:
      type: object
      required: [id, name, description, place, imagePath, registrationLink, startDate, endDate, createdAt, updatedAt, interestCount]
      description: |
        Tournament shape returned in the list response.
        `imagePath` is the internal relative path stored in the DB (e.g. `tournaments/<uuid>.jpg`).
        Use `GET /tournaments/{id}/image` to download the image.
        `myInterested` is present only for the student role.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        place:
          type: string
          nullable: true
          description: "Venue or location for the tournament. Null if unspecified."
        imagePath:
          type: string
          nullable: true
          description: "Relative path under UPLOADS_DIR (e.g. \"tournaments/uuid.jpg\"). Null if no image."
        registrationLink:
          type: string
          nullable: true
          description: External registration URL.
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        interestCount:
          type: integer
          description: Total number of students who expressed interest.
        myInterested:
          type: boolean
          description: "Present only for student role. True if the requesting student has expressed interest."

    TournamentDetail:
      allOf:
        - $ref: '#/components/schemas/TournamentSummary'
        - type: object
          required: [createdBy]
          properties:
            createdBy:
              $ref: '#/components/schemas/UserSummary'

    TournamentListResponse:
      type: object
      required: [tournaments]
      properties:
        tournaments:
          type: array
          items:
            $ref: '#/components/schemas/TournamentSummary'
          description: Sorted by startDate desc (nulls last), then createdAt desc.

    TournamentResponse:
      type: object
      required: [tournament]
      properties:
        tournament:
          $ref: '#/components/schemas/TournamentDetail'

    TournamentInterestResponse:
      type: object
      required: [interested, interestCount]
      description: Returned flat (no wrapper key) by POST /tournaments/{id}/interest.
      properties:
        interested:
          type: boolean
          description: The resulting interest state for the requesting student.
        interestCount:
          type: integer
          description: Updated total interest count for the tournament.

    PollSummary:
      type: object
      required: [id, title, startDate, endDate, isActive, myVoted]
      description: Poll item returned in the list response.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
          description: True if current time is between startDate and endDate (server-computed, not stored).
        myVoted:
          type: boolean
          description: True if the requesting user has cast a vote in this poll.

    PollVoter:
      type: object
      required: [id, name]
      description: A user who voted for a specific option. Only present in option.voters for admin/teacher roles.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        className:
          $ref: '#/components/schemas/ClassName'

    PollOptionDetail:
      type: object
      required: [id, label, order, hasImage, voteCount]
      description: |
        A single poll option as returned in a PollDetail response.
        `imagePath` is never exposed; use `GET /polls/{id}/options/{optionId}/image` to retrieve the image.
        `voters` is present only when the caller's role is admin or teacher.
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          maxLength: 200
        order:
          type: integer
          description: Display order (0-indexed, ascending).
        hasImage:
          type: boolean
          description: True if this option has an associated image.
        voteCount:
          type: integer
          description: Number of votes cast for this option.
        voters:
          type: array
          items:
            $ref: '#/components/schemas/PollVoter'
          description: Present for admin/teacher only. Voters who selected this option, sorted by name asc.

    PollDetail:
      type: object
      required: [id, title, startDate, endDate, isActive, myVoted, myOptionId, createdBy, options, totalVotes]
      description: Full poll detail including options, vote counts, and (for admin/teacher) voter lists per option.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
          description: True if current time is between startDate and endDate (server-computed).
        myVoted:
          type: boolean
          description: True if the requesting user has cast a vote.
        myOptionId:
          type: string
          format: uuid
          nullable: true
          description: ID of the option the requesting user voted for. Null if not yet voted.
        createdBy:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/PollOptionDetail'
          description: Options ordered by `order` asc.
        totalVotes:
          type: integer
          description: Total number of votes across all options.

    PollListResponse:
      type: object
      required: [polls]
      properties:
        polls:
          type: array
          items:
            $ref: '#/components/schemas/PollSummary'
          description: Sorted by endDate descending.

    PollResponse:
      type: object
      required: [poll]
      properties:
        poll:
          $ref: '#/components/schemas/PollDetail'

    VoteRequest:
      type: object
      required: [optionId]
      properties:
        optionId:
          type: string
          format: uuid
          description: ID of the poll option to vote for.

    ResourceType:
      type: string
      enum: [book, homework, app]
      description: Category of the resource.

    ResourceDetail:
      type: object
      required: [id, title, type, description, url, isEnabled, hasImage, hasFile, fileName, createdBy, createdAt, updatedAt]
      description: |
        A resource item as returned in all resource API responses.
        `imagePath`, `filePath`, and `fileMime` are internal fields and are **never exposed**.
        Non-admin callers only receive resources where `isEnabled=true`.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        type:
          $ref: '#/components/schemas/ResourceType'
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
          description: Optional external URL. Must be a valid URL if provided.
        isEnabled:
          type: boolean
          description: Admin-controlled visibility flag. Non-admins never see disabled resources.
        hasImage:
          type: boolean
          description: True if an image has been uploaded for this resource.
        hasFile:
          type: boolean
          description: True if a downloadable file has been uploaded for this resource.
        fileName:
          type: string
          nullable: true
          description: Original filename of the uploaded file. Null if no file is attached.
        createdBy:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResourceListResponse:
      type: object
      required: [resources]
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceDetail'
          description: Sorted by createdAt descending.

    ResourceResponse:
      type: object
      required: [resource]
      properties:
        resource:
          $ref: '#/components/schemas/ResourceDetail'

    StudentDashboardStats:
      type: object
      required: [totalSessions, sessionsJoined, pendingPayments]
      description: Dashboard stats returned for the student role.
      properties:
        totalSessions:
          type: integer
          description: Non-cancelled sessions (isCancelled=false).
        sessionsJoined:
          type: integer
          description: Attendance rows where present=true for the requesting student.
        pendingPayments:
          type: integer
          description: Payment rows where status='pending' for the requesting student.

    TeacherDashboardStats:
      type: object
      required: [totalSessions, totalStudents]
      description: Dashboard stats returned for the teacher role.
      properties:
        totalSessions:
          type: integer
          description: Non-cancelled sessions (isCancelled=false).
        totalStudents:
          type: integer
          description: Active students only (isActive=true).

    AdminDashboardStats:
      type: object
      required: [totalSessions, totalStudents, totalTeachers]
      description: Dashboard stats returned for the admin role.
      properties:
        totalSessions:
          type: integer
          description: Non-cancelled sessions (isCancelled=false).
        totalStudents:
          type: integer
          description: Active students only (isActive=true).
        totalTeachers:
          type: integer
          description: Active teachers only (isActive=true).

    DashboardStatsResponse:
      type: object
      required: [stats]
      properties:
        stats:
          oneOf:
            - $ref: '#/components/schemas/StudentDashboardStats'
            - $ref: '#/components/schemas/TeacherDashboardStats'
            - $ref: '#/components/schemas/AdminDashboardStats'
          description: Shape depends on the authenticated user's role.

    NotificationType:
      type: string
      enum:
        - session_created
        - pre_attendance_set
        - attendance_marked_present
        - paid_cash
        - receipt_uploaded
        - payment_reviewed
        - tournament_added
        - poll_created
      description: Event that triggered the notification.

    Notification:
      type: object
      required: [id, type, title, message, readAt, createdAt]
      description: |
        In-app notification for the authenticated user. Emitted fire-and-forget — delivery is not guaranteed.
        `payload` is reserved for future structured data; currently always null.
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
        message:
          type: string
        linkPath:
          type: string
          nullable: true
          description: "Optional in-app navigation path, e.g. /sessions/<id>."
        payload:
          nullable: true
          description: Reserved structured data. Currently always null.
        readAt:
          type: string
          format: date-time
          nullable: true
          description: Null when the notification is unread.
        createdAt:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      required: [notifications]
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
          description: Sorted by createdAt descending.

    UnreadCountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: Number of notifications where readAt is null.

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
        details:
          description: Optional validation details
          nullable: true

paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      tags: [Users]
      description: |
        Returns users ordered by `name asc`.

        **Role access:**
        - Admin: may filter by any role.
        - Teacher: may only list students. If `role` is omitted, defaults to `student`. Any other `role` value returns 403.
        - Coach/Student: 403.
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/Role'
          description: Filter by role. Teachers may only pass `student` (or omit).
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status. Omit to return all.
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role, or teacher filtering by non-student role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: Forbidden
                teacher_role_filter:
                  value:
                    error: Teachers can only list students

    post:
      summary: Create a user
      operationId: createUser
      tags: [Users]
      description: |
        Creates a new user. Password is bcrypt-hashed (cost 10) before storage.

        **Role access:**
        - Admin: any role.
        - Teacher: only `role=student`; returns 403 for any other role.
        - Others: 403.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error (username format, password length, invalid role, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role, or teacher creating non-student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: Forbidden
                teacher_non_student:
                  value:
                    error: Teachers can only create student accounts
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Username already taken

  /users/{id}:
    get:
      summary: Get a single user
      operationId: getUser
      tags: [Users]
      description: |
        **Role access:**
        - Admin: any user.
        - Teacher: students only.
        - Any role (self): own record.
        - Others accessing non-self: 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Teacher accessing non-student, or non-admin/non-self accessing another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update a user
      operationId: updateUser
      tags: [Users]
      description: |
        Partially updates a user. Allowed fields depend on caller role:
        - **Admin**: `name`, `phone`, `isActive`, `role`, `username`, `className` (any target).
        - **Teacher**: `name`, `phone`, `isActive`, `className` on student targets or own profile.
        - **Self** (student/coach): `name`, `phone`, `className` on own profile only.
        Non-admin callers including `username` receive 403. Changing a username does not invalidate the affected user's JWT.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Zod validation error (invalid field values)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Multiple cases depending on caller and target:
            - Coach/student accessing non-self → `"Forbidden"`
            - Teacher accessing non-student → `"Forbidden"`
            - Teacher setting a disallowed field (`role`, `username`, etc.) on a student → `"Teachers can only update students' name, phone, or isActive"`
            - Self or teacher-self setting `isActive` or `role` → `"You can only update your own name and phone"`
            - Non-admin including `username` → `"Only admin can change username"`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: Forbidden
                teacher_disallowed_field:
                  value:
                    error: "Teachers can only update students' name, phone, or isActive"
                self_name_phone_only:
                  value:
                    error: You can only update your own name and phone
                non_admin_username:
                  value:
                    error: Only admin can change username
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Username already taken

  /users/{id}/password:
    post:
      summary: Set a user's password (admin only)
      operationId: setUserPassword
      tags: [Users]
      description: |
        Admin-only endpoint. Sets a new bcrypt-hashed password for any user.
        There is no self-service password change in Phase 1 (see REQUIREMENTS §11 decision #1).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        '204':
          description: Password updated. No response body.
        '400':
          description: Validation error (password too short)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions:
    get:
      summary: List coaching sessions
      operationId: listSessions
      tags: [Sessions]
      description: |
        Returns all sessions ordered by `date` asc, then `startTime` asc.
        Cancelled sessions are included by default; use `includeCancelled=false` to exclude them.
        Requires authentication (any role).
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Filter sessions on or after this date (YYYY-MM-DD).
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Filter sessions on or before this date (YYYY-MM-DD).
        - name: includeCancelled
          in: query
          schema:
            type: boolean
            default: true
          description: Set false to exclude cancelled sessions from results.
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new coaching session
      operationId: createSession
      tags: [Sessions]
      description: |
        Creates a new session. Allowed roles: admin, teacher.
        `date` must be today or in the future (UTC). `startTime` must be before `endTime`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error (invalid date, startTime ≥ endTime, missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Role not permitted (coach or student)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /sessions/{id}:
    get:
      summary: Get a single session
      operationId: getSession
      tags: [Sessions]
      description: Returns full session detail including embedded `createdBy` and `cancelledBy` (if cancelled). Any authenticated role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update or cancel a session
      operationId: updateSession
      tags: [Sessions]
      description: |
        Partially updates a session. Allowed roles: admin, teacher.

        **Cancellation rules:**
        - Set `isCancelled: true` to soft-cancel. Server sets `cancelledAt` and `cancelledById` automatically — client must not send these fields.
        - Once cancelled, only an admin may un-cancel (`isCancelled: false`), which resets `cancelledAt` / `cancelledById` to null.
        - Any other edit on a cancelled session returns 409.

        **Validation:**
        - Same date / time rules as POST apply to any updated fields.
        - `startTime` and `endTime` are validated together if either is provided.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Two distinct cases:
            - Role not permitted (coach/student) → `{"error": "Forbidden"}`
            - Teacher attempting un-cancel (`isCancelled: false`) → `{"error": "Only admin can un-cancel a session"}`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                role_not_permitted:
                  value:
                    error: Forbidden
                non_admin_uncancel:
                  value:
                    error: Only admin can un-cancel a session
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Session is cancelled and the request is not an un-cancel (`isCancelled: false`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Cannot edit a cancelled session; un-cancel it first"

  /sessions/{id}/pre-attendance:
    post:
      summary: Toggle pre-attendance for a session
      operationId: togglePreAttendance
      tags: [Attendance]
      description: |
        Sets or removes pre-attendance for a session. Allowed roles: student, teacher, admin.

        - `confirmed: true` — upsert a PreAttendance record.
        - `confirmed: false` — delete the PreAttendance record if it exists.

        **Acting on self vs on behalf:**
        - `studentId` omitted → acts on the requester. Requester must be a student — else 400 `"studentId is required when acting on behalf"`.
        - `studentId` present → acts on behalf of that student. Requester must be admin or teacher — else 403 `"Only staff can set pre-attendance on behalf of others"`.

        **Rules:**
        - Session must exist (404).
        - Session must not be cancelled (409).
        - Target must be an active student — else 400 `"Target must be an active student"`.
        - **Cutoff (10 min before `startTime`):** enforced for student self-action only; waived when staff act on behalf.
        - Coach role: 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreAttendanceRequest'
      responses:
        '200':
          description: Pre-attendance updated. `preAttendance` is null when confirmed=false.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreAttendanceResponse'
        '400':
          description: |
            Validation error. Possible messages:
            - Missing/invalid `confirmed` field (Zod)
            - `"studentId is required when acting on behalf"` — non-student omitted `studentId`
            - `"Target must be an active student"` — `studentId` refers to non-student or inactive user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_student_id:
                  value:
                    error: studentId is required when acting on behalf
                invalid_target:
                  value:
                    error: Target must be an active student
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Two distinct cases:
            - Coach role (any request) → `"Forbidden"`
            - Student supplying `studentId` (acting on behalf) → `"Only staff can set pre-attendance on behalf of others"`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  value:
                    error: Forbidden
                student_on_behalf:
                  value:
                    error: Only staff can set pre-attendance on behalf of others
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Session not found
        '409':
          description: |
            Two distinct cases:
            - Session is cancelled → `{"error": "Cannot pre-attend a cancelled session"}` (all roles)
            - 10-minute cutoff has passed → `{"error": "Pre-attendance cutoff has passed"}` (students only; waived for staff)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                cancelled:
                  value:
                    error: Cannot pre-attend a cancelled session
                cutoff:
                  value:
                    error: Pre-attendance cutoff has passed

  /sessions/{id}/attendance:
    get:
      summary: Get attendance roster for a session
      operationId: getAttendanceRoster
      tags: [Attendance]
      description: |
        Returns all active students with their pre-attendance, present, and paidCash status for the session.
        Allowed roles: admin, teacher.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session ID
      responses:
        '200':
          description: Attendance roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRoster'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Role is not admin or teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Session not found

    put:
      summary: Bulk mark attendance for a session
      operationId: markAttendance
      tags: [Attendance]
      description: |
        Upserts attendance records for a batch of students. Idempotent — can be called multiple times to correct mistakes.

        **Rules:**
        - Session must exist (404).
        - Session must not be cancelled (409).
        - Every `studentId` in `entries` must be an active student — the entire batch is rejected (400) if any ID is invalid.
        - On conflict `(sessionId, studentId)`, updates `present`, `paidCash`, `markedById`, `markedAt`.
        - Allowed roles: admin, teacher.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkAttendanceRequest'
      responses:
        '200':
          description: Number of records upserted
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer
                    description: Count of attendance records created or updated.
        '400':
          description: |
            Zod validation error (e.g. missing fields, wrong types, empty `entries` array),
            or one or more `studentId` values are not valid active students.
            Invalid student IDs are listed in the error message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid or inactive student IDs: <uuid1>, <uuid2>"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Role is not admin or teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Session not found
        '409':
          description: Session is cancelled — attendance cannot be marked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Cannot mark attendance for a cancelled session

  /auth/login:
    post:
      summary: Log in and receive JWT cookie
      operationId: authLogin
      security: []
      tags: [Auth]
      description: |
        Authenticates a user with username + password.
        On success, sets an httpOnly cookie named `stf_token` containing the JWT.
        Rate-limited to 20 requests per 15 minutes per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful; JWT set in httpOnly cookie
          headers:
            Set-Cookie:
              description: "stf_token=<jwt>; HttpOnly; SameSite=Lax; Path=/; Max-Age=604800 (Secure added when NODE_ENV=production)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Request body failed validation (missing or invalid fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Validation error
                details:
                  username: [Required]
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid credentials
        '403':
          description: Account is deactivated (`is_active = false`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Account is deactivated
        '429':
          description: Rate limit exceeded (20 req / 15 min per IP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Too many requests, please try again later.

  /auth/logout:
    post:
      summary: End session and clear JWT cookie
      operationId: authLogout
      tags: [Auth]
      description: Clears the `stf_token` httpOnly cookie. No request body required.
      responses:
        '204':
          description: Logged out; `stf_token` cookie cleared. No response body.

  /auth/me:
    get:
      summary: Get current authenticated user
      operationId: authMe
      security:
        - cookieAuth: []
      tags: [Auth]
      description: Returns the user object for the authenticated session. Requires a valid `stf_token` cookie.
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: |
            Authentication failed. Three distinct cases:
            - Missing cookie → `{"error": "Authentication required"}`
            - Bad/expired JWT → `{"error": "Invalid or expired token"}`
            - User deactivated after login → `{"error": "User not found or inactive"}`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_cookie:
                  value:
                    error: Authentication required
                invalid_token:
                  value:
                    error: Invalid or expired token
                user_inactive:
                  value:
                    error: User not found or inactive

  /auth/change-password:
    post:
      summary: Change own password
      operationId: changePassword
      tags: [Auth]
      description: |
        Allows any authenticated user to change their own password.
        The caller must supply their current password for verification.
        The JWT cookie is **not revoked** on success — existing sessions remain active.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed. No response body. Existing JWT session remains active.
        '400':
          description: |
            Validation error. Two distinct cases:
            - `newPassword` is less than 8 characters (Zod)
            - New and current passwords are identical → `"New password must be different from current"`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                too_short:
                  value:
                    error: Validation error
                same_password:
                  value:
                    error: New password must be different from current
        '401':
          description: |
            Not authenticated, or `currentPassword` does not match the stored hash → `"Current password is incorrect"`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthenticated:
                  value:
                    error: Authentication required
                wrong_current:
                  value:
                    error: Current password is incorrect

  /config/fee:
    get:
      summary: Get current session fee
      operationId: getFee
      tags: [Config]
      description: Returns the current session fee. Any authenticated role.
      responses:
        '200':
          description: Current fee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponse'
              example:
                fee: 50
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session fee not yet configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Session fee not configured

    put:
      summary: Update session fee (admin only)
      operationId: setFee
      tags: [Config]
      description: |
        Sets the global session fee. Admin only.
        The new fee applies to future payment uploads; existing `Payment.amount` values are not recalculated (FR-28).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFeeRequest'
      responses:
        '200':
          description: Updated fee
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeResponse'
              example:
                fee: 60
        '400':
          description: Validation error (not positive, >10000, or more than 2 decimal places)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /payments:
    post:
      summary: Upload a payment receipt
      operationId: uploadPayment
      tags: [Payments]
      description: |
        Student uploads a receipt image or PDF for a session. The current session fee is snapshotted into `Payment.amount` at upload time (FR-28).

        **File constraints:**
        - Allowed MIME types: `image/jpeg`, `image/png`, `application/pdf`
        - Maximum file size: 5 MB
        - Files are stored on disk with UUID filenames under the server's `/uploads/` directory and are never web-exposed directly. Use `GET /payments/{id}/receipt` to download.

        **Rules:**
        - Only students may call this endpoint.
        - The target session must exist and must not be cancelled.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sessionId, receipt]
              properties:
                sessionId:
                  type: string
                  format: uuid
                  description: The session this payment is for.
                receipt:
                  type: string
                  format: binary
                  description: "Receipt file. Allowed: JPEG, PNG, PDF. Max 5 MB."
      responses:
        '201':
          description: Payment record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: |
            Validation or file error. Possible messages:
            - `"Invalid file type. Allowed: JPEG, PNG, PDF"` — unsupported MIME type
            - `"File exceeds 5 MB limit"` — file too large
            - `"Receipt file is required"` — no file part in the request
            - Zod validation error — missing or invalid `sessionId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_mime:
                  value:
                    error: "Invalid file type. Allowed: JPEG, PNG, PDF"
                too_large:
                  value:
                    error: File exceeds 5 MB limit
                no_file:
                  value:
                    error: Receipt file is required
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Session not found
        '409':
          description: Session is cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Cannot submit payment for a cancelled session

    get:
      summary: List payments
      operationId: listPayments
      tags: [Payments]
      description: |
        Returns payments ordered by `uploadedAt desc`.

        **Role access:**
        - **Student**: always receives own payments only; query filters are ignored.
        - **Admin / Teacher**: may filter by `status`, `studentId`, and `sessionId`.
        - **Coach**: 403.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
          description: Filter by status. Admin/teacher only — ignored for students.
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by student. Admin/teacher only — ignored for students.
        - name: sessionId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by session. Admin/teacher only — ignored for students.
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '400':
          description: Validation error (invalid UUID or status value in query)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is coach
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /payments/{id}:
    get:
      summary: Get a single payment
      operationId: getPayment
      tags: [Payments]
      description: |
        Returns a single payment record.

        **Role access:**
        - **Student**: own payments only. Returns 403 for other students' payments.
        - **Admin / Teacher**: any payment.
        - **Coach**: 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Payment ID
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Coach role, or student accessing another student's payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Payment not found

  /payments/{id}/receipt:
    get:
      summary: Download a payment receipt file
      operationId: downloadReceipt
      tags: [Payments]
      description: |
        Streams the receipt file stored on disk. The file is never web-accessible directly — this guarded endpoint enforces the same role rules as `GET /payments/{id}`.

        Response `Content-Type` is derived from the file extension:
        - `.jpg` → `image/jpeg`
        - `.png` → `image/png`
        - `.pdf` → `application/pdf`

        `Content-Disposition` is `inline; filename="<uuid>.<ext>"`.

        **Role access:**
        - **Student**: own receipts only.
        - **Admin / Teacher**: any receipt.
        - **Coach**: 403.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Payment ID
      responses:
        '200':
          description: Receipt file binary
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Coach role, or student accessing another student's receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: |
            Payment record not found, or file missing on disk. Possible messages:
            - `"Payment not found"`
            - `"Receipt file not available"`
            - `"Receipt file not found on disk"`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                payment_not_found:
                  value:
                    error: Payment not found
                file_unavailable:
                  value:
                    error: Receipt file not available
                file_missing:
                  value:
                    error: Receipt file not found on disk

  /payments/{id}/review:
    patch:
      summary: Approve or reject a payment
      operationId: reviewPayment
      tags: [Payments]
      description: |
        Sets a payment's status to `approved` or `rejected`. Only `pending` payments may be reviewed — any other status returns 409.

        **Note on `note` field:** The optional review note is logged server-side but is **not persisted** to the database in Phase 1 (no `reviewNote` column in schema).

        Allowed roles: admin, teacher.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Payment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewPaymentRequest'
      responses:
        '200':
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error (missing or invalid `decision`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin or teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Payment not found
        '409':
          description: "Payment is not pending. Message: `\"Payment has already been approved\"` or `\"Payment has already been rejected\"`"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                already_approved:
                  value:
                    error: Payment has already been approved
                already_rejected:
                  value:
                    error: Payment has already been rejected

  /payments/history:
    get:
      summary: Get payment history for a student
      operationId: getPaymentHistory
      tags: [Payments]
      description: |
        Returns a unified list of cash and online payments for a student, sorted by `paidAt` descending.

        **Role access:**
        - **Student**: always receives own history; `studentId` query param is ignored.
        - **Admin / Teacher**: `studentId` is required — returns 400 if omitted.
        - **Coach**: 403.

        **Cash entry caveat:** `amount` on cash entries reflects the current session fee at request time, not the fee at the time the cash was paid. This is a known Phase 1 limitation.
      parameters:
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
          description: Required for admin/teacher. Ignored for students (own history always returned).
      responses:
        '200':
          description: Payment history entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'
        '400':
          description: Admin or teacher omitted required `studentId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is coach
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /payments/history/{entryId}/receipt:
    get:
      summary: Download a generated PDF receipt for a history entry
      operationId: downloadHistoryReceipt
      tags: [Payments]
      description: |
        Generates and streams a PDF receipt for a single history entry (cash or online).

        The PDF contains: student name/username, session date/place, amount, payment method, paid-at timestamp, and reviewer name (online) or attendance-marker name (cash).

        `entryId` is the compound `id` value from `GET /payments/history`:
        - Online: `online:<paymentId>` → URL-encode as `online%3A<paymentId>`
        - Cash: `cash:<sessionId>:<studentId>` → URL-encode colons

        **Role access:**
        - **Student**: own history entries only (403 for other students).
        - **Admin / Teacher**: any entry.
        - **Coach**: 403.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
          description: "Compound entry ID from HistoryEntry.id. Colons must be URL-encoded (e.g. online%3A<uuid>)."
          example: online%3Aabc12345-0000-0000-0000-000000000001
      responses:
        '200':
          description: Generated PDF receipt
          headers:
            Content-Disposition:
              description: 'attachment; filename="receipt-<shortid>.pdf"'
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Coach role, or student accessing another student's receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Entry ID unknown or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Entry exists but is not in approved state — receipt PDF cannot be generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Receipt available only for approved payments

  /notifications:
    get:
      summary: List notifications for the authenticated user
      operationId: listNotifications
      tags: [Notifications]
      description: |
        Returns the caller's own notifications sorted by `createdAt` descending.
        Use `unread=true` to fetch only unread notifications. Any authenticated role.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of notifications to return.
        - name: unread
          in: query
          schema:
            type: boolean
          description: "When `true`, returns only notifications where `readAt` is null. Omit or set `false` for all."
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '400':
          description: Validation error (limit out of range or invalid unread value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/unread-count:
    get:
      summary: Get unread notification count for the authenticated user
      operationId: getUnreadCount
      tags: [Notifications]
      description: Returns the count of notifications where `readAt` is null. Intended for polling by the frontend bell indicator.
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/read-all:
    post:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      tags: [Notifications]
      description: Sets `readAt = now()` on all unread notifications for the caller. Idempotent — safe to call when already all-read.
      responses:
        '204':
          description: All notifications marked as read. No response body.
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/{id}/read:
    post:
      summary: Mark a single notification as read
      operationId: markNotificationRead
      tags: [Notifications]
      description: |
        Sets `readAt = now()` on the specified notification. Idempotent — calling again on an already-read notification is a no-op (still 204).
        Returns 404 if the notification does not exist or belongs to a different user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Notification ID
      responses:
        '204':
          description: Notification marked as read. No response body.
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Notification not found or belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Notification not found

  /dashboard/stats:
    get:
      summary: Get dashboard statistics for the authenticated user
      operationId: getDashboardStats
      tags: [Dashboard]
      description: |
        Returns summary statistics for the authenticated user. Fetched in a single DB transaction.

        Response shape is discriminated by caller role:
        - **Student**: `totalSessions`, `sessionsJoined`, `pendingPayments`
        - **Teacher**: `totalSessions`, `totalStudents`
        - **Admin**: `totalSessions`, `totalStudents`, `totalTeachers`
        - **Coach**: 403

        `totalSessions` counts non-cancelled sessions only. `totalStudents` / `totalTeachers` count active users only (`isActive=true`).
      responses:
        '200':
          description: Dashboard statistics for the caller's role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is coach
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /tournaments:
    get:
      summary: List tournaments
      operationId: listTournaments
      tags: [Tournaments]
      description: |
        Returns all tournaments sorted by `startDate desc` (nulls last), then `createdAt desc`. Any authenticated role.
        `myInterested` field is present only for the student role.
      responses:
        '200':
          description: List of tournaments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a tournament (admin only)
      operationId: createTournament
      tags: [Tournaments]
      description: |
        Creates a new tournament. Admin only.
        Emits a fire-and-forget notification to all active students on creation.

        **Image constraints:** JPEG, PNG, WebP; ≤ 5 MB. Optional.
        Images are stored under `UPLOADS_DIR/tournaments/` with a UUID filename.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  minLength: 1
                place:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: Venue or location. Optional.
                registrationLink:
                  type: string
                  format: uri
                  description: External registration URL. Optional.
                startDate:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  description: "YYYY-MM-DD format. Optional."
                endDate:
                  type: string
                  pattern: '^\d{4}-\d{2}-\d{2}$'
                  description: "YYYY-MM-DD format. Optional."
                image:
                  type: string
                  format: binary
                  description: "Tournament image. Allowed: JPEG, PNG, WebP. Max 5 MB. Optional."
      responses:
        '201':
          description: Tournament created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentResponse'
        '400':
          description: |
            Validation or file error:
            - `"Invalid file type. Allowed: JPEG, PNG, WebP"` — unsupported MIME
            - `"File exceeds 5 MB limit"` — file too large
            - Zod validation error — invalid field values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /tournaments/{id}:
    get:
      summary: Get a tournament
      operationId: getTournament
      tags: [Tournaments]
      description: Returns full tournament detail including `createdBy`. `myInterested` present for student role only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tournament detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tournament not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Tournament not found

    patch:
      summary: Update a tournament (admin only)
      operationId: updateTournament
      tags: [Tournaments]
      description: |
        Partially updates a tournament. Admin only. All fields are optional.

        **Image handling:**
        - Supply a new `image` file to replace the current one (old file deleted from disk).
        - Send `removeImage=true` (string `"true"`, not boolean) to clear the image without replacement.
        - Omit both to leave the image unchanged.

        Sending an empty string for `registrationLink`, `startDate`, or `endDate` clears the field to null.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  minLength: 1
                place:
                  type: string
                  description: "Venue or location. Empty string to clear → null."
                registrationLink:
                  type: string
                  description: "URL or empty string to clear."
                startDate:
                  type: string
                  description: "YYYY-MM-DD or empty string to clear."
                endDate:
                  type: string
                  description: "YYYY-MM-DD or empty string to clear."
                image:
                  type: string
                  format: binary
                  description: "New image file. Replaces existing. Allowed: JPEG, PNG, WebP. Max 5 MB."
                removeImage:
                  type: string
                  enum: ['true']
                  description: "Send the string \"true\" to clear the current image without replacement."
      responses:
        '200':
          description: Updated tournament
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentResponse'
        '400':
          description: Validation or file error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Tournament not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Tournament not found

    delete:
      summary: Delete a tournament (admin only)
      operationId: deleteTournament
      tags: [Tournaments]
      description: Hard-deletes the tournament record and removes the image file from disk (if present). Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tournament deleted. No response body.
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Tournament not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Tournament not found

  /tournaments/{id}/image:
    get:
      summary: Download tournament image
      operationId: downloadTournamentImage
      tags: [Tournaments]
      description: Streams the tournament image file. Any authenticated role. `Content-Disposition` is `inline; filename="<uuid>.<ext>"`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: |
            Three distinct cases:
            - `"Tournament not found"`
            - `"No image for this tournament"`
            - `"Image file not found"` — record exists but file missing on disk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    error: Tournament not found
                no_image:
                  value:
                    error: No image for this tournament
                file_missing:
                  value:
                    error: Image file not found

  /tournaments/{id}/interest:
    post:
      summary: Toggle tournament interest (student only)
      operationId: toggleTournamentInterest
      tags: [Tournaments]
      description: |
        Sets or removes the requesting student's interest in a tournament. Idempotent.
        - `interested: true` — upserts a TournamentInterest record.
        - `interested: false` — removes the record if it exists.

        Response is flat (`{ interested, interestCount }`) — no outer wrapper key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interested]
              properties:
                interested:
                  type: boolean
      responses:
        '200':
          description: Updated interest state and count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentInterestResponse'
        '400':
          description: Validation error (missing or non-boolean `interested`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not a student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Tournament not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Tournament not found

  /polls:
    get:
      summary: List polls
      operationId: listPolls
      tags: [Polls]
      description: |
        Returns all polls ordered by endDate descending. Available to every authenticated role.
      responses:
        '200':
          description: Poll list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create poll (admin only)
      operationId: createPoll
      tags: [Polls]
      description: |
        Creates a new poll with 2–10 options. Admin only.

        Request must be `multipart/form-data`. The `options` field must be a JSON-encoded string containing an array of `{ label }` objects.
        Option images are uploaded as `option_0`, `option_1`, … `option_9` — one file per option at the corresponding index. Images are optional per option.

        On success, a `poll_created` notification is sent fire-and-forget to all active users except the creator.

        **File constraints:** JPEG, PNG, WebP; max 5 MB per file.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, startDate, endDate, options]
              properties:
                title:
                  type: string
                  maxLength: 200
                description:
                  type: string
                startDate:
                  type: string
                  format: date-time
                  description: ISO 8601 datetime. Must be before endDate.
                endDate:
                  type: string
                  format: date-time
                  description: ISO 8601 datetime. Must be after startDate.
                options:
                  type: string
                  description: 'JSON-encoded array of { label } objects. Min 2, max 10. Example: [{"label":"Option A"},{"label":"Option B"}]'
                option_0:
                  type: string
                  format: binary
                  description: Image for option at index 0 (optional).
                option_1:
                  type: string
                  format: binary
                  description: Image for option at index 1 (optional).
                option_2:
                  type: string
                  format: binary
                  description: Image for option at index 2 (optional).
      responses:
        '201':
          description: Poll created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollResponse'
        '400':
          description: Validation error (invalid fields, options parse failure, endDate ≤ startDate, or invalid file)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_file_type:
                  value:
                    error: 'Invalid file type. Allowed: JPEG, PNG, WebP'
                file_too_large:
                  value:
                    error: File exceeds 5 MB limit
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /polls/{id}:
    get:
      summary: Get poll
      operationId: getPoll
      tags: [Polls]
      description: |
        Returns full poll detail. Available to every authenticated role.
        Admin and teacher additionally receive `voters` arrays per option.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Poll detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Poll not found

    patch:
      summary: Update poll (admin only)
      operationId: updatePoll
      tags: [Polls]
      description: |
        Updates poll metadata (title, description, startDate, endDate). Admin only.
        **Options cannot be edited after creation.**
        Send `description: null` or `description: ""` to clear the description.
        If both `startDate` and `endDate` are provided they must satisfy `endDate > startDate`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  description: Send null or empty string to clear.
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                  description: Must be after startDate if both are provided.
      responses:
        '200':
          description: Updated poll
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Poll not found

    delete:
      summary: Delete poll (admin only)
      operationId: deletePoll
      tags: [Polls]
      description: |
        Hard-deletes the poll, all votes, and all option image files from disk. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Poll deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Poll not found

  /polls/{id}/options/{optionId}/image:
    get:
      summary: Download poll option image
      operationId: downloadPollOptionImage
      tags: [Polls]
      description: |
        Streams the image file for a specific poll option.
        Available to every authenticated role.
        Returns `Content-Type` based on file extension (jpeg/png/webp).
        `Content-Disposition: inline`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: optionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Option not found, has no image, or image file missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    error: Option not found
                no_image:
                  value:
                    error: No image for this option
                file_missing:
                  value:
                    error: Image file not found

  /polls/{id}/vote:
    post:
      summary: Cast vote
      operationId: castVote
      tags: [Polls]
      description: |
        Submits the authenticated user's vote for a specific poll option. Available to every authenticated role.
        **Votes are immutable** — a user may vote exactly once per poll (unique constraint `[pollId, userId]`).
        Returns full poll detail (with updated vote counts) with HTTP 201.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
      responses:
        '201':
          description: Vote recorded; returns updated poll detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollResponse'
        '400':
          description: Option does not belong to this poll
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid option for this poll
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Poll not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Poll not found
        '409':
          description: Vote rejected — poll not yet started, already ended, or user already voted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_started:
                  value:
                    error: Poll has not started
                ended:
                  value:
                    error: Poll has ended
                already_voted:
                  value:
                    error: You have already voted

  /resources:
    get:
      summary: List resources
      operationId: listResources
      tags: [Resources]
      description: |
        Returns resources ordered by createdAt descending.
        - **Non-admin:** only `isEnabled=true` resources are returned.
        - **Admin:** all resources regardless of `isEnabled`.
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ResourceType'
          description: Filter by resource type. Omit to return all types.
      responses:
        '200':
          description: Resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create resource (admin only)
      operationId: createResource
      tags: [Resources]
      description: |
        Creates a new resource. Admin only. Request must be `multipart/form-data`.

        **File fields:**
        - `image` — JPEG, PNG, or WebP; max **5 MB**.
        - `file` — any MIME type; max **20 MB**. Original filename is stored and returned as `fileName`.

        Both file fields are optional.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, type]
              properties:
                title:
                  type: string
                  maxLength: 200
                type:
                  $ref: '#/components/schemas/ResourceType'
                description:
                  type: string
                url:
                  type: string
                  format: uri
                  description: Must be a valid URL if provided. Empty string is ignored.
                isEnabled:
                  type: string
                  enum: ['true', 'false']
                  description: Defaults to 'true' if omitted.
                image:
                  type: string
                  format: binary
                  description: Optional thumbnail/cover image (JPEG/PNG/WebP, max 5 MB).
                file:
                  type: string
                  format: binary
                  description: Optional downloadable file (any type, max 20 MB).
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'
        '400':
          description: Validation error or invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_image_type:
                  value:
                    error: 'Invalid image type. Allowed: JPEG, PNG, WebP'
                image_too_large:
                  value:
                    error: Image exceeds 5 MB limit
                file_too_large:
                  value:
                    error: File exceeds 20 MB limit
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden

  /resources/{id}:
    get:
      summary: Get resource
      operationId: getResource
      tags: [Resources]
      description: |
        Returns a single resource. Available to every authenticated role.
        Non-admin callers receive 404 for disabled resources (same as not found).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found or disabled (non-admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found

    patch:
      summary: Update resource (admin only)
      operationId: updateResource
      tags: [Resources]
      description: |
        Updates a resource. Admin only. Request must be `multipart/form-data`; all fields are optional.

        - Send `removeImage=true` to delete the existing image from disk and clear `hasImage`.
        - Send `removeFile=true` to delete the existing file from disk and clear `hasFile`/`fileName`.
        - Uploading a new `image` or `file` replaces the existing one (old file deleted from disk).
        - Send `description=""` or `url=""` to clear those fields.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                type:
                  $ref: '#/components/schemas/ResourceType'
                description:
                  type: string
                  nullable: true
                  description: Send empty string to clear.
                url:
                  type: string
                  nullable: true
                  description: Must be a valid URL if provided. Send empty string to clear.
                isEnabled:
                  type: string
                  enum: ['true', 'false']
                removeImage:
                  type: string
                  enum: ['true']
                  description: Send the string 'true' to remove the existing image.
                removeFile:
                  type: string
                  enum: ['true']
                  description: Send the string 'true' to remove the existing file.
                image:
                  type: string
                  format: binary
                  description: Replacement image (JPEG/PNG/WebP, max 5 MB). Replaces existing if present.
                file:
                  type: string
                  format: binary
                  description: Replacement file (any type, max 20 MB). Replaces existing if present.
      responses:
        '200':
          description: Updated resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'
        '400':
          description: Validation error or invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found

    delete:
      summary: Delete resource (admin only)
      operationId: deleteResource
      tags: [Resources]
      description: |
        Hard-deletes the resource and removes both image and file from disk. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Resource deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Forbidden
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found

  /resources/{id}/image:
    get:
      summary: Download resource image
      operationId: downloadResourceImage
      tags: [Resources]
      description: |
        Streams the resource's image file. Available to every authenticated role.
        Non-admin callers receive 404 for disabled resources.
        `Content-Disposition: inline`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found, disabled (non-admin), or no image attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_found:
                  value:
                    error: Resource not found
                no_image:
                  value:
                    error: No image for this resource
                file_missing:
                  value:
                    error: Image file not found

  /resources/{id}/file:
    get:
      summary: Download resource file
      operationId: downloadResourceFile
      tags: [Resources]
      description: |
        Streams the resource's downloadable file. Available to every authenticated role.
        Non-admin callers receive 404 for disabled resources.
        `Content-Disposition: attachment; filename="<originalName>"`.
        `Content-Type` is the stored MIME type of the file (`application/octet-stream` if unknown).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found, disabled (non-admin), or no file attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
