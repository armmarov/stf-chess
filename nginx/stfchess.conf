# STF Supreme Chess — Nginx reverse proxy config
#
# Copy to /etc/nginx/sites-available/stfchess.conf and symlink into sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/stfchess.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Frontend build at /var/www/html/stf
#   - Backend listening on 127.0.0.1:3888 (pm2 process "stf-be")
#   - TLS via Let's Encrypt (see README deployment section)

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name www.stfchess.com stfchess.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.stfchess.com$request_uri;
    }
}

# ---- HTTPS — main app ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.stfchess.com;

    # TLS — certbot updates these paths on first run
    ssl_certificate     /etc/letsencrypt/live/www.stfchess.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.stfchess.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Payments upload cap (backend enforces 5MB; allow margin for multipart overhead)
    client_max_body_size 6M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    root /var/www/html/stf;
    index index.html;

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://127.0.0.1:3888;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Don't buffer PDF / file streams
        proxy_buffering off;
    }

    # ---- Static frontend (Vue SPA) ----
    # Hashed assets — long-lived cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — Vue Router handles unknown paths client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/stfchess.access.log;
    error_log  /var/log/nginx/stfchess.error.log;
}
