# STF Supreme Chess — Nginx reverse proxy config (HTTPS)
#
# Use this AFTER Let's Encrypt certs exist for www.stfchess.com.
# For the first-time bootstrap (no certs yet), use stfchess.bootstrap.conf first.
#
# ─── First-time deployment runbook ────────────────────────────────────────────
#
# 1. Prepare ACME webroot:
#      sudo mkdir -p /var/www/certbot
#
# 2. Install the BOOTSTRAP config (HTTP only):
#      sudo cp nginx/stfchess.bootstrap.conf /etc/nginx/sites-available/stfchess.conf
#      sudo ln -sf /etc/nginx/sites-available/stfchess.conf /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#    (Confirm http://www.stfchess.com/ serves the frontend before continuing.)
#
# 3. Install certbot and issue certificates:
#      sudo apt install -y certbot python3-certbot-nginx
#      sudo certbot certonly --webroot -w /var/www/certbot \
#          -d www.stfchess.com -d stfchess.com \
#          --agree-tos --email you@example.com --no-eff-email
#    Certs land under /etc/letsencrypt/live/www.stfchess.com/.
#
# 4. Swap in THIS config (HTTPS):
#      sudo cp nginx/stfchess.conf /etc/nginx/sites-available/stfchess.conf
#      sudo nginx -t && sudo systemctl reload nginx
#
# 5. Auto-renewal: handled by the certbot.timer systemd unit (enabled by
#    default on Debian/Ubuntu). Verify with:
#      sudo systemctl status certbot.timer
#      sudo certbot renew --dry-run
#    Certbot reloads Nginx automatically after a successful renewal.
#
# ─── Assumptions ──────────────────────────────────────────────────────────────
#   - Frontend build copied to /var/www/html/stf
#   - Backend listens on 127.0.0.1:3888 (pm2 process "stf-be")
#   - DNS A/AAAA records for www.stfchess.com and stfchess.com point here

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name www.stfchess.com stfchess.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.stfchess.com$request_uri;
    }
}

# ---- HTTPS — main app ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.stfchess.com;

    # TLS — certbot updates these paths on first run
    ssl_certificate     /etc/letsencrypt/live/www.stfchess.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.stfchess.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Payments upload cap (backend enforces 5MB; allow margin for multipart overhead)
    client_max_body_size 6M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    root /var/www/html/stf;
    index index.html;

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://127.0.0.1:3888;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Don't buffer PDF / file streams
        proxy_buffering off;
    }

    # ---- Static frontend (Vue SPA) ----
    # Hashed assets — long-lived cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — Vue Router handles unknown paths client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/stfchess.access.log;
    error_log  /var/log/nginx/stfchess.error.log;
}
