# STF Supreme Chess — Bootstrap Nginx config (HTTP-only)
#
# Use this ONE TIME, before Let's Encrypt certs exist.
# Purpose: serve the frontend over HTTP and expose the ACME challenge path
#          so certbot can complete the HTTP-01 validation.
#
# After certs are issued, REPLACE this file with stfchess.conf.
#
# Install:
#   sudo mkdir -p /var/www/certbot
#   sudo cp nginx/stfchess.bootstrap.conf /etc/nginx/sites-available/stfchess.conf
#   sudo ln -sf /etc/nginx/sites-available/stfchess.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue certs:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot certonly --webroot -w /var/www/certbot \
#       -d www.stfchess.com -d stfchess.com \
#       --agree-tos --email you@example.com --no-eff-email
#
# Then swap in the full HTTPS config (stfchess.conf):
#   sudo cp nginx/stfchess.conf /etc/nginx/sites-available/stfchess.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Auto-renew is handled by the certbot.timer systemd unit (enabled by default
# on Debian/Ubuntu). Verify with:
#   sudo systemctl status certbot.timer
#   sudo certbot renew --dry-run

server {
    listen 80;
    listen [::]:80;
    server_name www.stfchess.com stfchess.com;

    # ACME HTTP-01 challenge — must be reachable for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 6M;

    root /var/www/stf;
    index index.html;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3888;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
